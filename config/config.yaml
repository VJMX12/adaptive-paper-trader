  timeframe: 5m
  candles_lookback: 600  # candles fetched per analysis cycle

live:
  # Real orders on Bybit require ALL THREE, else dry-run (logs, never sends):
  #   1. enabled: true               (this flag)
  #   2. BYBIT_API_KEY + BYBIT_API_SECRET env vars present
  #   3. env LIVE_CONFIRM=YES         (explicit arming — keys alone won't arm)
  # Dry-run logs every order it WOULD send (side, qty, SL/TP, notional).
  enabled: true
  testnet: false            # true -> Bybit testnet (validate live wiring, no real money)
  max_notional_usd: 200.0   # per-order notional cap; larger sizes are CLAMPED down

costs:
  # Frictions subtracted from every simulated close so the learner trains on
  # realistic (not cost-free) PnL. Bybit linear-perp taker ~0.055%.
  taker_fee_pct: 0.00055    # per side, on notional
  slippage_pct: 0.0003      # assumed slippage per side, on notional
  funding_pct_per_8h: 0.0001  # perpetual funding, prorated by hold time

engine:
  analysis_interval_seconds: 300   # run one full analysis per symbol every N seconds
  monitor_interval_seconds: 20     # check open paper trades every N seconds
  warmup_candles: 250              # minimum candles before the engine will act

regime:
  n_states: 4          # discovered, unlabeled regimes
  fit_window: 1500     # candles used when (re)fitting the HMM
  refit_every: 288     # analysis cycles between HMM refits
  sticky: 0.97         # self-transition prior (regime persistence)

changepoint:
  hazard: 250.0        # expected run length between changepoints (in candles)
  alert_threshold: 0.35  # P(changepoint in last few candles) above this = uncertainty alarm

strategy:
  min_confidence: 0.60   # do not trade below this calibrated confidence
  min_rr: 1.5            # minimum acceptable risk/reward
  sl_sigma_mult: 1.6     # stop distance in units of current volatility sigma
  tp_rr: 2.0             # take-profit distance = tp_rr * stop distance
  cooldown_minutes: 45   # per-symbol cooldown after closing a trade
  max_trade_hours: 48    # time-based exit safety net

risk:
  starting_equity: 10000.0
  base_risk_pct: 0.01        # risk per trade at full multipliers
  kelly_fraction: 0.25       # fraction of full Kelly ever used
  max_open_positions: 3
  vol_target_annual: 0.35    # annualized volatility target for scaling
  drawdown_soft_pct: 0.05    # exposure starts decaying past this drawdown
  drawdown_hard_pct: 0.15    # circuit breaker: no new trades beyond this
  max_daily_loss_pct: 0.04   # circuit breaker: halt new entries for the day

retrieval:
  k: 15                # similar historical trades retrieved per analysis
  min_history: 8       # below this many closed trades, retrieval is informational only

llm:
  enabled: false             # true = use Anthropic API for narrative reasoning & reviews
  model: claude-sonnet-4-6
  max_tokens: 800

telegram:
  enabled: true
  # token & chat id come from .env: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

dashboard:
  enabled: true
  host: 0.0.0.0
  port: 8787

database:
  path: data/paper_trader.db

logging:
  level: INFO
  json: false     # true = JSON lines (for shipping to a log stack)
