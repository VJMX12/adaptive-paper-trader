# Adaptive Paper Trader configuration
# All secrets go in .env — never in this file.

exchange:
  id: bybit              # any ccxt exchange id with public market data
  market_type: swap      # swap = USDT linear perpetuals (long & short); spot = spot market
  symbols:                 # curated big-cap crypto majors only -- deepest
                            # order books on Bybit, so real slippage tracks
                            # costs.slippage_pct much better than the long
                            # tail of small-caps/memes/synthetic-equity pairs
                            # this list used to include.
    - BTC/USDT:USDT
    - ETH/USDT:USDT
    - XRP/USDT:USDT
    - BNB/USDT:USDT
    - SOL/USDT:USDT
    - DOGE/USDT:USDT
    - ADA/USDT:USDT
    - TRX/USDT:USDT
    - LINK/USDT:USDT
    - AVAX/USDT:USDT
    - XLM/USDT:USDT
    - LTC/USDT:USDT
    - BCH/USDT:USDT
    - DOT/USDT:USDT
    - UNI/USDT:USDT
    - NEAR/USDT:USDT
    - ICP/USDT:USDT
    - APT/USDT:USDT
    - ATOM/USDT:USDT
    - ARB/USDT:USDT
    - OP/USDT:USDT
    - HBAR/USDT:USDT
    - SUI/USDT:USDT
    - INJ/USDT:USDT
    - TAO/USDT:USDT
    - XMR/USDT:USDT
    - AAVE/USDT:USDT
  timeframe: 5m
  candles_lookback: 600  # candles fetched per analysis cycle

live:
  # Real orders on Bybit require ALL THREE, else dry-run (logs, never sends):
  #   1. enabled: true               (this flag)
  #   2. BYBIT_API_KEY + BYBIT_API_SECRET env vars present
  #   3. env LIVE_CONFIRM=YES         (explicit arming — keys alone won't arm)
  # Dry-run logs every order it WOULD send (side, qty, SL/TP, notional).
  enabled: true
  testnet: false            # true -> Bybit testnet (validate live wiring, no real money)
  max_notional_usd: 200.0   # per-order notional cap; larger sizes are CLAMPED down

costs:
  # Frictions subtracted from every simulated close so the learner trains on
  # realistic (not cost-free) PnL. Bybit linear-perp taker ~0.055%.
  taker_fee_pct: 0.00055    # per side, on notional
  slippage_pct: 0.0003      # assumed slippage per side, on notional
  funding_pct_per_8h: 0.0001  # perpetual funding, prorated by hold time

engine:
  analysis_interval_seconds: 300   # run one full analysis per symbol every N seconds
  monitor_interval_seconds: 20     # check open paper trades every N seconds
  warmup_candles: 250              # minimum candles before the engine will act

regime:
  n_states: 4          # discovered, unlabeled regimes
  fit_window: 1500     # candles used when (re)fitting the HMM
  refit_every: 288     # analysis cycles between HMM refits
  sticky: 0.97         # self-transition prior (regime persistence)

changepoint:
  hazard: 250.0        # expected run length between changepoints (in candles)
  alert_threshold: 0.45  # P(changepoint in last few candles) above this = uncertainty alarm
  # raised from 0.35: was vetoing a lot of entries on mild drift; the
  # learner.changepoint_lr_boost below compensates by learning FASTER through
  # real regime shifts instead of just refusing to trade near them.

strategy:
  min_confidence: 0.52   # do not trade below this calibrated confidence
  min_rr: 1.2            # minimum acceptable risk/reward
  # both loosened from 0.60/1.5 for more trade volume -> faster learning
  # feedback. This is paper money; the cost of a wider net is noisier P&L,
  # not real capital, so it's an acceptable trade for training signal.
  sl_sigma_mult: 1.6     # stop distance in units of current volatility sigma
  tp_rr: 2.0             # take-profit distance = tp_rr * stop distance
  cooldown_minutes: 0    # no forced wait before re-entering the same symbol
                          # (was 15/45) -- the only remaining per-symbol gate
                          # is app/trading/paper_engine.py's has_open_trade
                          # check, which just blocks two SIMULTANEOUS open
                          # positions on one symbol (can't hold long+short at
                          # once); re-entry right after a close is now instant.
  max_trade_hours: 48    # time-based exit safety net

risk:
  starting_equity: 10000.0
  base_risk_pct: 0.01        # risk per trade at full multipliers
  kelly_fraction: 0.35       # fraction of full Kelly ever used (was 0.25)
  max_open_positions: 6      # was 3 -- more concurrent paper trades = more signal/week
  vol_target_annual: 0.35    # annualized volatility target for scaling
  drawdown_soft_pct: 0.05    # exposure starts decaying past this drawdown
  drawdown_hard_pct: 0.15    # circuit breaker: no new trades beyond this
  max_daily_loss_pct: 0.04   # circuit breaker: halt new entries for the day

retrieval:
  k: 15                # similar historical trades retrieved per analysis
  min_history: 5       # below this many closed trades, retrieval is informational only (was 8)

learner:
  # Online logistic learner tuning (app/analysis/model.py). Overrides apply on
  # every restart even to an already-persisted model (see load_learner_state).
  lr: 0.05                    # base SGD step size (was hardcoded 0.03)
  l2: 0.02                     # weight-decay regularization (unchanged)
  decay: 0.995                 # EWMA forgetting for the feature normalizer (unchanged)
  cold_start_handover: 80       # #updates before fully trusting the model over
                                 # the drift prior (was hardcoded 150) -- trust
                                 # its own read sooner as it accumulates trades.
  changepoint_lr_boost: 1.0
  # was 3.0 (up to 4x lr at high changepoint prob) — dialed back because that
  # multiplier hit hardest exactly when the feature normalizer was least
  # stable (see the norm_snapshot fix in app/analysis/model.py), amplifying
  # noisy weight updates right when they were least trustworthy. Revisit
  # upward once calibration (dashboard /metrics confidence_calibration) shows
  # stated confidence tracking actual win rate again.
  # NEW: concept-drift adaptation. Effective lr for a symbol becomes
  # lr * (1 + changepoint_lr_boost * P(changepoint)) at the moment of
  # learning, so right after a real regime shift the model snaps to the new
  # conditions in far fewer samples, then relaxes back to the base rate once
  # BOCPD says the market has settled. This is what should help the model
  # "retain" edge as the market's actual behavior changes over time, instead
  # of dragging outdated pre-shift weights forward.

validation:
  # Walk-forward / prequential out-of-sample validation (exposed at /validation).
  # Predictions are already OOS (online learner predicts before it updates); these
  # windows partition the trade log for reporting edge + calibration + degradation.
  train_days: 14
  test_days: 7
  step_days: 3

shadow:
  # Shadow labels: every analysis records the model's preferred setup and later
  # resolves it against the forward price path (TP-before-SL), training the
  # learner far beyond the rare live fills. Fixes data starvation + cold-start bias.
  enabled: true
  horizon_hours: 24          # give up (expire) if neither barrier hit within this (was 48)
  max_resolve_per_cycle: 150 # cap resolution work per symbol per cycle (was 80)

retention:
  # The analyses table (100 symbols × every cycle) is the dominant disk consumer
  # and grows without bound. Cap it by ROW COUNT so disk is bounded regardless of
  # per-row size; freed pages are reused so the SQLite file plateaus.
  # ~60k rows ≈ 2 days across 100 symbols — plenty for the feed + regime stability.
  analyses_max_rows: 60000

llm:
  enabled: false             # true = use Anthropic API for narrative reasoning & reviews
  model: claude-sonnet-4-6
  max_tokens: 800

telegram:
  enabled: true
  # token & chat id come from .env: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

dashboard:
  enabled: true
  host: 0.0.0.0
  port: 8787

database:
  path: data/paper_trader.db

logging:
  level: INFO
  json: false     # true = JSON lines (for shipping to a log stack)
